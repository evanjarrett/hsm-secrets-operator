{{- if and .Values.agentTls.enabled .Values.agentTls.certManager.enabled }}
{{- /*
Optional cert-manager path for the manager<->agent mTLS PKI. When enabled, the
operator reads (never writes) these Secrets. The server cert pins SAN "hsm-agent"
because the manager verifies against that pinned ServerName (agents are dialed by
ephemeral pod IP). Both certs must be issued by the same CA issuerRef so mTLS
verifies. Requires a cert-manager CA-type issuer supplied via
agentTls.certManager.issuerRef.
*/ -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.agentTls.serverSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hsm-secrets-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: mtls
  annotations:
    hsm.j5t.io/mtls-managed-by: cert-manager
spec:
  secretName: {{ .Values.agentTls.serverSecretName }}
  secretTemplate:
    annotations:
      hsm.j5t.io/mtls-managed-by: cert-manager
  duration: {{ .Values.agentTls.leafValidity }}
  renewBefore: {{ .Values.agentTls.renewBefore }}
  commonName: hsm-agent
  dnsNames:
    - hsm-agent
  usages:
    - server auth
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ required "agentTls.certManager.issuerRef.name is required when certManager is enabled" .Values.agentTls.certManager.issuerRef.name }}
    kind: {{ .Values.agentTls.certManager.issuerRef.kind }}
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.agentTls.clientSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hsm-secrets-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: mtls
  annotations:
    hsm.j5t.io/mtls-managed-by: cert-manager
spec:
  secretName: {{ .Values.agentTls.clientSecretName }}
  secretTemplate:
    annotations:
      hsm.j5t.io/mtls-managed-by: cert-manager
  duration: {{ .Values.agentTls.leafValidity }}
  renewBefore: {{ .Values.agentTls.renewBefore }}
  commonName: hsm-manager
  dnsNames:
    - hsm-manager
  usages:
    - client auth
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ required "agentTls.certManager.issuerRef.name is required when certManager is enabled" .Values.agentTls.certManager.issuerRef.name }}
    kind: {{ .Values.agentTls.certManager.issuerRef.kind }}
    group: cert-manager.io
{{- end }}
