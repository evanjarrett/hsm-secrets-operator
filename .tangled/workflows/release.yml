when:
  - event: ["push"]
    tag: ["v*"]

engine: kubernetes
image: quay.io/buildah/stable:latest
architecture: amd64

environment:
  IMAGE_REGISTRY: buoy.cr

steps:
  - name: Login to registry
    command: |
      REPO_DID_ENCODED=$(printf '%s' "${TANGLED_REPO_DID}" | sed 's/:/-/g')
      echo "${APP_PASSWORD}" | buildah login \
        -u "${REPO_DID_ENCODED}" \
        --password-stdin \
        ${IMAGE_REGISTRY}

  - name: Build and push image
    command: |
      REPO_DID_ENCODED=$(printf '%s' "${TANGLED_REPO_DID}" | sed 's/:/-/g')
      buildah bud \
        --tag ${IMAGE_REGISTRY}/${REPO_DID_ENCODED}/${TANGLED_REPO_NAME}:${TANGLED_REF_NAME} \
        --tag ${IMAGE_REGISTRY}/${REPO_DID_ENCODED}/${TANGLED_REPO_NAME}:latest \
        --file ./Dockerfile \
        .

      buildah push \
        ${IMAGE_REGISTRY}/${REPO_DID_ENCODED}/${TANGLED_REPO_NAME}:${TANGLED_REF_NAME}

      buildah push \
        ${IMAGE_REGISTRY}/${REPO_DID_ENCODED}/${TANGLED_REPO_NAME}:latest
