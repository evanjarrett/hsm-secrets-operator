when:
  - event: ["push"]
    branch: ["*"]
  - event: ["pull_request"]
    branch: ["main"]

engine: kubernetes
image: golang:1.26-trixie
architecture: amd64

steps:
  - name: Install dependencies and tools
    environment:
      CGO_ENABLED: "1"
    command: |
      apt-get update && apt-get install -y libudev-dev
      go mod download
      make install-linter

  - name: Run Linter
    environment:
      CGO_ENABLED: "1"
    command: |
      make lint
